name: release

# Manual trigger only. Publishes forja-components to Sonatype Central.
# Requires the following secrets on the repo:
#   SIGNING_KEY       — ASCII-armored PGP private key (gpg --export-secret-keys -a)
#   SIGNING_PASSPHRASE — key passphrase
#   CENTRAL_USER      — Sonatype Central portal token username
#   CENTRAL_TOKEN     — Sonatype Central portal token secret

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0). Leave blank to publish the current SNAPSHOT."
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17 + Maven credentials
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
          server-id: central
          server-username: CENTRAL_USER
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.SIGNING_KEY }}
          gpg-passphrase: SIGNING_PASSPHRASE
      - name: Set release version
        if: ${{ github.event.inputs.version != '' }}
        run: mvn -B -ntp versions:set -DnewVersion=${{ github.event.inputs.version }} -DprocessAllModules
      - name: Deploy to Sonatype Central
        env:
          CENTRAL_USER: ${{ secrets.CENTRAL_USER }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          SIGNING_PASSPHRASE: ${{ secrets.SIGNING_PASSPHRASE }}
        run: mvn -B -ntp -P release -pl forja-components -am deploy
